<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inquiry Submitted | Astonity</title>
  <style>
    :root {
      --bg: #050816;
      --text: #E5F4FF;
      --muted: #9FB4C8;
      --blue: #4F8EF7;
      --cyan: #00D4FF;
      --line: rgba(79, 142, 247, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.14), transparent 34%),
        radial-gradient(circle at 12% 18%, rgba(79, 142, 247, 0.12), transparent 26%),
        #050816;
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.10) 1px, transparent 1px);
      background-size: 68px 68px;
      opacity: 0.12;
      pointer-events: none;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(860px, calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 42px 0;
    }

    .card {
      width: 100%;
      border: 1px solid rgba(0, 212, 255, 0.22);
      border-radius: 32px;
      padding: clamp(28px, 6vw, 62px);
      background:
        radial-gradient(circle at top, rgba(0,212,255,0.09), transparent 36%),
        linear-gradient(180deg, rgba(229,244,255,0.075), rgba(229,244,255,0.025));
      box-shadow:
        0 0 50px rgba(0, 0, 0, 0.36),
        inset 0 0 28px rgba(79,142,247,0.035);
      backdrop-filter: blur(12px);
    }

    img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 18px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 18px rgba(0, 212, 255, 0.24));
    }

    .eyebrow {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: white;
      font-size: clamp(40px, 8vw, 74px);
      line-height: 0.92;
      letter-spacing: -0.06em;
      text-transform: uppercase;
    }

    p {
      max-width: 560px;
      margin: 22px auto 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .primary {
      background: linear-gradient(135deg, #E5F4FF, #73C7FF);
      color: #050816;
    }

    .secondary {
      color: var(--text);
      border: 1px solid rgba(229, 244, 255, 0.14);
      background: rgba(229, 244, 255, 0.035);
    }

    .contact {
      margin-top: 26px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact a {
      display: inline;
      padding: 0;
      min-height: 0;
      color: var(--text);
      letter-spacing: inherit;
      text-transform: none;
      font-size: inherit;
    }

    @media (max-width: 560px) {
      .actions {
        flex-direction: column;
      }

      a {
        width: 100%;
      }
    }
  </style>
</head>
